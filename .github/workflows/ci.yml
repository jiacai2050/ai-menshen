name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"

jobs:
  go:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.go')
          if [ "${#files[@]}" -eq 0 ]; then
            exit 0
          fi

          mapfile -t unformatted < <(gofmt -l "${files[@]}")
          if [ "${#unformatted[@]}" -gt 0 ]; then
            echo "The following files need gofmt:"
            printf '  - %s\n' "${unformatted[@]}"
            exit 1
          fi

      - name: Build packages
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build binary
        run: make build
