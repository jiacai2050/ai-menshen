listen = ":8080"
verbose = false

[[providers]]
base_url = "https://api.openai.com/v1"
api_key = "${OPENAI_API_KEY}"
# Optional: override the client's model before forwarding upstream.
# model = "gpt-4.1"
# Optional: custom headers (useful for Cloudflare AI Gateway BYOK)
# headers = { "cf-aig-authorization" = "Bearer ${DEEPSEEK_API_KEY}" }

[storage]
sqlite_path = "./data/menshen.db"
retention_days = 30

[cache]
enable = true
max_body_bytes = 1048576

[logging]
log_request_body = true
log_response_body = true
