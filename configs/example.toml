listen = ":8080"
verbose = false

[auth]
enable = false
# Used for browser-based Dashboard access (User:Password)
user = "admin"
password = "your-password-here"
# Used for API proxying (Authorization: Bearer <token>)
token = "sk-your-proxy-token"

[[providers]]
base_url = "https://api.openai.com/v1"
api_key = "${OPENAI_API_KEY}"
# Optional: override the client's model before forwarding upstream.
# model = "gpt-4.1"
# Optional: custom headers (useful for Cloudflare AI Gateway BYOK)
# headers = { "cf-aig-authorization" = "Bearer ${DEEPSEEK_API_KEY}" }

[storage]
sqlite_path = "./data/menshen.db"
retention_days = 90

[cache]
enable = true
max_body_bytes = 1048576

[logging]
log_request_body = true
log_response_body = true
