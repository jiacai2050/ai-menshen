listen = ":8080"
verbose = false

[auth]
enable = false
# Used for browser-based Dashboard access (User:Password)
user = "admin"
password = "your-password-here"  # supports ${ENV}
# Used for API proxying (Authorization: Bearer <token>)
token = "sk-your-proxy-token"  # supports ${ENV}

[[providers]]
base_url = "https://api.openai.com/v1"
api_key = "${OPENAI_API_KEY}"  # supports ${ENV}
# Optional: override the client's model before forwarding upstream.
# model = "gpt-4.1"
# Optional: custom headers (useful for Cloudflare AI Gateway BYOK)
# headers = { "cf-aig-authorization" = "Bearer ${CLOUDFLARE_API_KEY}" }  # values support ${ENV}

[upstream]
# Upstream request timeout in seconds (default: 300)
# timeout = 300

[storage]
retention_days = 90

[storage.sqlite]
path = "./data/menshen.db"  # supports ${ENV}

[cache]
enable = true
# Skip caching responses larger than this size (bytes)
max_body_bytes = 5242880
# Cache TTL in seconds (0 = never expire)
# max_age = 0

[logging]
# Persist full request body in DB (disable to save disk / for privacy)
# log_request_body = true
# Persist full response body in DB (also required for cache hits to return body)
# log_response_body = true
